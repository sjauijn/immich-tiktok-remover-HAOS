name: "Immich TikTok Remover"
description: "Detects and trashes/archives TikTok videos in Immich using filename and creation-date heuristics (stable-lite, no ML)"
version: "1.0.0"
slug: "immich_tiktok_remover"
url: "https://github.com/mxc2/immich-tiktok-remover/"
init: false
apparmor: true
startup: application
boot: auto
arch:
  - amd64
  - aarch64
map: []
options:
  run_every_seconds: 3600
  verbose: false
  jobs:
    - immich_url: ""
      api_key: ""
      output_all: false
      archive: false
      search_archived: false
      file_types: "mp4"
      file_name_length: 32
      file_name_is_not_alumn: false
      file_created_after: 1472688000
schema:
  run_every_seconds: "int(0,)"
  verbose: "bool"
  jobs:
    - immich_url: "url"
      api_key: "password"
      output_all: "bool"
      archive: "bool"
      search_archived: "bool"
      file_types: "str"
      file_name_length: "int(0,)"
      file_name_is_not_alumn: "bool"
      file_created_after: "int(0,)"
