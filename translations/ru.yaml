configuration:
  run_every_seconds:
    name: Интервал сканирования (секунды)
    description: Как часто повторно запускать все задачи. 0 — выполнить один раз и завершить.
  verbose:
    name: Подробное логгирование
    description: Вести детальный журнал вызовов API для каждой задачи.
  jobs:
    name: Задачи сканирования
    description: Одна запись на аккаунт Immich для поиска TikTok-видео.
    fields:
      immich_url:
        name: URL сервера Immich
        description: Учитывайте адрес и порт, например http://homeassistant.local:8080 или https://immich.example.com
      api_key:
        name: API-ключ
        description: API-ключ, созданный в этом конкретном аккаунте Immich.
      output_all:
        name: Выводить все видео
        description: Логгировать каждое проверенное видео, а не только определённые как TikTok.
      archive:
        name: Архивировать вместо удаления
        description: Отправлять найденные TikTok-видео в архив вместо корзины.
      search_archived:
        name: Учитывать архивные видео
        description: Также проверять видео, которые уже находятся в архиве.
      file_types:
        name: Расширения файлов
        description: Список расширений видео через запятую для проверки (например mp4).
      file_name_length:
        name: Ожидаемая длина имени файла
        description: Длина имени файла без расширения, характерная для экспортов TikTok. 0 отключает эту проверку.
      file_name_is_not_alumn:
        name: Отключить проверку на буквенно-цифровое имя
        description: Включите, если экспортированные из TikTok файлы не имеют чисто буквенно-цифровых имён.
      file_created_after:
        name: Проверять только видео созданные после (формат unix timestamp)
        description: Пропускает видео, созданные раньше указанной даты. 0 отключает эту проверку.
